name: Auto Merge on 2+ Approvals

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [synchronize]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Approve 수 확인 후 머지
        run: |
          PR_STATE=$(gh api \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
            --jq '.state')

          if [ "$PR_STATE" != "open" ]; then
            echo "PR이 이미 closed/merged 상태 — 스킵"
            exit 0
          fi

          APPROVALS=$(gh api \
            repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            --jq '[.[] | select(.state == "APPROVED")] | unique_by(.user.login) | length')

          echo "현재 Approve 수 (유니크 리뷰어 기준): $APPROVALS"

          if [ "$APPROVALS" -ge 2 ]; then
            echo "Approve 2개 이상 달성 — 자동 머지 실행"
            gh pr merge ${{ github.event.pull_request.number }} \
              --merge \
              --repo ${{ github.repository }}
          else
            echo "Approve $APPROVALS/2 — 대기 중"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
